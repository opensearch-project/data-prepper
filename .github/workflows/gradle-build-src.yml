name: Gradle - Check buildSrc

on:
  push:
    paths:
      - 'buildSrc/**'
      - '*gradle*'
  pull_request:
    paths:
      - 'buildSrc/**'
      - '*gradle*'

  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        java: [11, 17, 21]
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin

    - name: Checkout Data Prepper
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      with:
        add-job-summary: on-failure
    - name: Check Gradle buildSrc
      run: ./gradlew -p buildSrc check
    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: data-prepper-test-results-java-${{ matrix.java }}
        path: '**/test-results/**/*.xml'

  publish-test-results:
    name: "Publish Unit Tests Results"
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: test-results

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@b9f6c61d965bcaa18acc02d6daf706373a448f02 # v1
        with:
          files: "test-results/**/*.xml"
