# This workflow builds and validates the release artifacts, drafts the GitHub
# release, and opens the changelog pull request.
#
# The OpenSearch project does not permit this repository's workflows to push
# branches and open pull requests against itself. Instead, the changelog PR
# branch is pushed to a fork and the PR is opened from that fork against this
# repository. This requires two settings to be configured:
#
#   vars.RELEASE_FORK_REPOSITORY  - the fork the PR branch is pushed to, as
#                                   'owner/repo'. It must be a real GitHub fork
#                                   of this repository (same fork network), as
#                                   cross-repository PRs are only allowed within
#                                   a fork network.
#   secrets.RELEASE_FORK_TOKEN    - a classic personal access token with the
#                                   'public_repo' (or 'repo' for private
#                                   repositories) and 'workflow' scopes. The
#                                   action uses it to push the branch to the
#                                   fork and to open the PR against this
#                                   repository, so its owner must have write
#                                   access to the fork. The 'workflow' scope is
#                                   required because the pushed branch may modify
#                                   files under .github/workflows; GitHub rejects
#                                   such pushes from a token without it. A
#                                   fine-grained token does not work here because
#                                   the single token must act on two repositories.

name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release-major-tag:
        description: 'Whether to create major tag of docker image or not. This will create a tag such as 2 which points to this version.'
        required: true
        type: boolean
      release-latest-tag:
        description: >
          Whether to create latest tag of docker image or not. This will update the latest tag to point to this version. 
          You should set this when releasing the latest version, but not patches to old versions.
        required: true
        type: boolean

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Verifies the release preconditions
  # 1. The release tag must already exist. A maintainer requests the tag via an issue in the
  #    opensearch-project/.github repository before running this workflow.
  # 2. The fork settings used to open the changelog pull request must be set.
  verify-preconditions:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Data Prepper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get Version
        run:  grep '^version=' gradle.properties >> $GITHUB_ENV
      - name: Verify release tag exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ github.TOKEN }}
          script: |
            const tag = '${{ env.version }}';
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`
              });
              core.info(`Found tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(
                  `Release tag '${tag}' does not exist. Request the tag by opening an issue in the ` +
                  `opensearch-project/.github repository before running this workflow.`
                );
              } else {
                throw error;
              }
            }
      - name: Validate fork configuration
        run: |
          if [ -z "${{ vars.RELEASE_FORK_REPOSITORY }}" ]; then
            echo "::error::The RELEASE_FORK_REPOSITORY variable is not set."
            echo "Set it to the 'owner/repo' of a fork of this repository that the changelog PR branch will be pushed to."
            exit 1
          fi
          if [ -z "${{ secrets.RELEASE_FORK_TOKEN }}" ]; then
            echo "::error::The RELEASE_FORK_TOKEN secret is not set."
            echo "Set it to a token with write access to ${{ vars.RELEASE_FORK_REPOSITORY }} and permission to create pull requests against this repository."
            exit 1
          fi
          echo "Changelog pull request branch will be pushed to fork: ${{ vars.RELEASE_FORK_REPOSITORY }}"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs: verify-preconditions

    steps:
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 11
        distribution: temurin
    - name: Checkout Data Prepper
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      with:
        add-job-summary: on-failure
    - name: Get Version
      run:  grep '^version=' gradle.properties >> $GITHUB_ENV
    - name: Build Jar Files
      run: ./gradlew --parallel --max-workers 2 build

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
      with:
        role-to-assume: ${{ secrets.RELEASE_IAM_ROLE }}
        aws-region: us-east-1

    - name: Build Archives
      run: ./gradlew --parallel --max-workers 2 :release:archives:buildArchives

    - name: Build Maven Artifacts
      run: ./gradlew publishAllPublicationsToMavenRepository

    - name: Upload Archives to Archives Bucket
      run: ./gradlew :release:archives:uploadArchives -Pregion=us-east-1 -Pbucket=${{ secrets.ARCHIVES_BUCKET_NAME }} -Pprofile=default -PbuildNumber=${{ github.run_number }}

    - name: Upload Maven Artifacts to Archives Bucket
      run: ./gradlew :release:maven:uploadArtifact -Pregion=us-east-1 -Pbucket=${{ secrets.ARCHIVES_BUCKET_NAME }} -Pprofile=default -PbuildNumber=${{ github.run_number }}

    - name: Log into Amazon ECR Public
      id: login-ecr
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: public.ecr.aws
      env:
        AWS_REGION: us-east-1
    - name: Build and Push Multi-Architecture Docker Image to Staging ECR
      run: ./gradlew :release:docker:dockerMultiArchitecturePush -PdockerRepository=${{ secrets.ECR_REPOSITORY_URL }}:${{ env.version }}-${{ github.run_number }}

  validate-docker:
    strategy:
      matrix:
        architecture: [x64, arm64]
      fail-fast: false
    runs-on: ${{ matrix.architecture == 'x64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout Data Prepper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get Version
        run:  grep '^version=' gradle.properties >> $GITHUB_ENV

      - name: Smoke Test Docker Image
        run: |
          docker pull ${{ secrets.ECR_REPOSITORY_URL }}:${{ env.version }}-${{ github.run_number }}
          ./release/smoke-tests/run-smoke-tests.sh -v ${{ env.version }}-${{ github.run_number }} -i ${{ secrets.ECR_REPOSITORY_URL }} -a ${{ matrix.architecture }}

  validate-archive:
    strategy:
      matrix:
        config:
          - image: "eclipse-temurin:11"
            archive: opensearch-data-prepper
          - image: "eclipse-temurin:17"
            archive: opensearch-data-prepper
          - image: "eclipse-temurin:21"
            archive: opensearch-data-prepper
          - image: "ubuntu:latest"
            archive: opensearch-data-prepper-jdk
        architecture: [x64, arm64]
      fail-fast: false
    runs-on: ${{ matrix.architecture == 'x64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout Data Prepper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get Version
        run:  grep '^version=' gradle.properties >> $GITHUB_ENV

      - name: Smoke Test Tarball Files
        run: >-
          ./release/smoke-tests/run-tarball-files-smoke-tests.sh
          -u ${{ secrets.ARCHIVES_PUBLIC_URL }}
          -v ${{ env.version }}
          -n ${{ github.run_number }}
          -i ${{ matrix.config.image }}
          -t ${{ matrix.config.archive }}
          -a ${{ matrix.architecture }}

  promote:
    runs-on: ubuntu-latest
    needs: [build, validate-docker, validate-archive]
    permissions:
      contents: write
      issues: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout Data Prepper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get Version
        id: get_version
        run: |
          grep '^version=' gradle.properties >> $GITHUB_ENV
          echo "version=$(grep '^version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Get Approvers
        id: get_approvers
        run: |
          echo "approvers=$(cat .github/CODEOWNERS | grep @ | tr -d '* ' | sed 's/@/,/g' | sed 's/,//1')" >> $GITHUB_OUTPUT
      - uses: trstringer/manual-approval@74d99dff7380e3e4b122d4ededcbca2b6ce59367 # v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ steps.get_approvers.outputs.approvers }}
          minimum-approvals: 2
          issue-title: 'Release Data Prepper : ${{ env.version }}'
          issue-body: >
            Please approve or deny the release of Data Prepper.

            **VERSION**: ${{ env.version }}

            **BUILD NUMBER**: ${{ github.run_number }}

            **RELEASE MAJOR TAG**: ${{ github.event.inputs.release-major-tag }}

            **RELEASE LATEST TAG**: ${{ github.event.inputs.release-latest-tag }}

          exclude-workflow-initiator-as-approver: false

      - name: Create Release Description
        run: |
          echo 'version: ${{ env.version }}' > release-description.yaml
          echo 'build_number: ${{ github.run_number }}' >> release-description.yaml
          echo 'release_major_tag: ${{ github.event.inputs.release-major-tag }}' >> release-description.yaml
          echo 'release_latest_tag: ${{ github.event.inputs.release-latest-tag }}' >> release-description.yaml

      - name: Draft release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          draft: true
          name: '${{ env.version }}'
          tag_name: '${{ env.version }}'
          files: |
            release-description.yaml

  generate-changelog:
    runs-on: ubuntu-latest
    needs: promote

    steps:
      - name: Checkout Data Prepper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch Tags
        run: git fetch origin --tags

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install git-release-notes
        run: npm install -g git-release-notes

      - name: Generate Changelog
        run: release/script/changelog/generate-changelog.sh ${{ needs.promote.outputs.version }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.RELEASE_FORK_TOKEN }}
          push-to-fork: ${{ vars.RELEASE_FORK_REPOSITORY }}
          add-paths: |
            release/release-notes/data-prepper.change-log-${{ needs.promote.outputs.version }}.md
          commit-message: 'Add Data Prepper ${{ needs.promote.outputs.version }} changelog.'
          signoff: true
          branch: changelog-${{ needs.promote.outputs.version }}
          delete-branch: true
          base: main
          title: 'Data Prepper ${{ needs.promote.outputs.version }} changelog'
          body: |
            Adds the Data Prepper ${{ needs.promote.outputs.version }} changelog generated by git-release-notes.
