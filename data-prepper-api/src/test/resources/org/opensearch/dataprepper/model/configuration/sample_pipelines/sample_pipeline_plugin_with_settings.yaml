test-pipeline:
  source:
    http:
      host: "0.0.0.0"
      port: 2021
  processor:
  - grok:
      match:
        message:
        - "%{COMMONAPACHELOG}"
  sink:
  - opensearch:
      hosts:
      - "https://localhost:9200"
      username: "admin"
      password: "admin"
  workers: 4
  delay: 100
