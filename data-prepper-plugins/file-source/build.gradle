dependencies {
    implementation project(':data-prepper-api')
    implementation project(':data-prepper-plugins:common')
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'io.micrometer:micrometer-core'
    testImplementation project(':data-prepper-plugins:blocking-buffer')
    testImplementation project(':data-prepper-test:test-event')
    testImplementation 'org.awaitility:awaitility'
    testImplementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
}

test {
    forkEvery = 1
    maxHeapSize = '512m'
}

sourceSets {
    integrationTest {
        java {
            compileClasspath = main.output + test.output + compileClasspath
            runtimeClasspath = main.output + test.output + runtimeClasspath
            srcDir file('src/integrationTest/java')
        }
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

task integrationTest(type: Test) {
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()

    filter {
        includeTestsMatching '*IT'
    }
}

jacocoTestCoverageVerification {
    dependsOn jacocoTestReport
    violationRules {
        rule {
            limit {
                minimum = 1.0
            }
        }
    }
}
