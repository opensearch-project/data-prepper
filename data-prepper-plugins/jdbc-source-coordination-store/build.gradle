dependencies {
    implementation project(':data-prepper-api')
    implementation 'com.zaxxer:HikariCP:5.1.0'
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'javax.inject:javax.inject:1'
    runtimeOnly 'org.postgresql:postgresql:42.7.7'
    runtimeOnly 'com.mysql:mysql-connector-j:8.4.0'
}

sourceSets {
    integrationTest {
        java {
            compileClasspath += main.output + test.output
            runtimeClasspath += main.output + test.output
            srcDir file('src/integrationTest/java')
        }
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntime.extendsFrom testRuntime
}

task integrationTest(type: Test) {
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    useJUnitPlatform()
    classpath = sourceSets.integrationTest.runtimeClasspath

    systemProperty 'tests.jdbc.url', System.getProperty('tests.jdbc.url', '')
    systemProperty 'tests.jdbc.username', System.getProperty('tests.jdbc.username', '')
    systemProperty 'tests.jdbc.password', System.getProperty('tests.jdbc.password', '')

    filter {
        includeTestsMatching '*IT'
    }
}
