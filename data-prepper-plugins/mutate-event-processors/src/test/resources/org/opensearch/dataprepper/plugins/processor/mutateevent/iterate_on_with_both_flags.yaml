test-pipeline:
  source:
    unused:
  processor:
    - add_entries:
        entries:
          - key: "title"
            value_expression: "/alert_title"
            iterate_on: "vulns"
            disable_root_keys: false
            add_to_element_when: '/severity == "critical"'
            evaluate_when_on_element: true
  sink:
    - unused:
