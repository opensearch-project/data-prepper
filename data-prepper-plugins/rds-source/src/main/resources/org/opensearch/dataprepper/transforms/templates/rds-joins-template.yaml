"<<pipeline-name>>":
  workers: "<<$.<<pipeline-name>>.workers>>"
  delay: "<<$.<<pipeline-name>>.delay>>"
  buffer: "<<$.<<pipeline-name>>.buffer>>"
  source:
    rds: "<<$.<<pipeline-name>>.source.rds>>"
  routes:
    - initial_load: 'getMetadata("ingestion_type") == "EXPORT"'
    - stream_load: 'getMetadata("ingestion_type") == "STREAM"'
  sink:
    - s3:
        routes:
          - initial_load
        aws:
          region:  "<<$.<<pipeline-name>>.source.rds.s3_region>>"
          sts_role_arn: "<<$.<<pipeline-name>>.source.rds.aws.sts_role_arn>>"
          sts_external_id: "<<$.<<pipeline-name>>.source.rds.aws.sts_external_id>>"
          sts_header_overrides: "<<$.<<pipeline-name>>.source.rds.aws.sts_header_overrides>>"
        bucket: "<<$.<<pipeline-name>>.source.rds.s3_bucket>>"
        threshold:
          event_collect_timeout: "120s"
          maximum_size: "2mb"
        aggregate_threshold:
          maximum_size: "128mb"
          flush_capacity_ratio: 0
        object_key:
          path_prefix: "${getMetadata(\"s3_partition_key\")}"
        codec:
          event_json:
        default_bucket_owner: "<<FUNCTION_NAME:getAccountIdFromRole,PARAMETER:$.<<pipeline-name>>.source.rds.aws.sts_role_arn>>"
    - s3:
        routes:
          - stream_load
        aws:
          region:  "<<$.<<pipeline-name>>.source.rds.s3_region>>"
          sts_role_arn: "<<$.<<pipeline-name>>.source.rds.aws.sts_role_arn>>"
          sts_external_id: "<<$.<<pipeline-name>>.source.rds.aws.sts_external_id>>"
          sts_header_overrides: "<<$.<<pipeline-name>>.source.rds.aws.sts_header_overrides>>"
        bucket: "<<$.<<pipeline-name>>.source.rds.s3_bucket>>"
        threshold:
          event_collect_timeout: "15s"
          maximum_size: "1mb"
        aggregate_threshold:
          maximum_size: "128mb"
          flush_capacity_ratio: 0
        object_key:
          path_prefix: "${getMetadata(\"s3_partition_key\")}"
        codec:
          event_json:
        default_bucket_owner: "<<FUNCTION_NAME:getAccountIdFromRole,PARAMETER:$.<<pipeline-name>>.source.rds.aws.sts_role_arn>>"
        client:
          max_connections: 100
          acquire_timeout: 20s
"<<pipeline-name>>-s3":
  workers: "<<$.<<pipeline-name>>.workers>>"
  delay: "<<$.<<pipeline-name>>.delay>>"
  buffer: "<<$.<<pipeline-name>>.buffer>>"
  source:
    s3:
      codec:
        event_json:
      compression: "none"
      aws:
        region:  "<<$.<<pipeline-name>>.source.rds.s3_region>>"
        sts_role_arn: "<<$.<<pipeline-name>>.source.rds.aws.sts_role_arn>>"
        sts_external_id: "<<$.<<pipeline-name>>.source.rds.aws.sts_external_id>>"
        sts_header_overrides: "<<$.<<pipeline-name>>.source.rds.aws.sts_header_overrides>>"
      acknowledgments: true
      delete_s3_objects_on_read: true
      disable_s3_metadata_in_event: true
      scan:
        acknowledgment_timeout: "PT10M"
        folder_partitions:
          depth: "<<FUNCTION_NAME:calculateDepthForRdsSource,PARAMETER:$.<<pipeline-name>>.source.rds.s3_prefix>>"
          max_objects_per_ownership: 50
        buckets:
          - bucket:
              name: "<<$.<<pipeline-name>>.source.rds.s3_bucket>>"
              filter:
                include_prefix: ["<<FUNCTION_NAME:getIncludePrefixForRdsSource,PARAMETER:$.<<pipeline-name>>.source.rds.s3_prefix>>"]
        scheduling:
          interval: "20s"
  processor: "<<$.<<pipeline-name>>.processor>>"
  sink:
    - opensearch:
        hosts: "<<$.<<pipeline-name>>.sink[?(@.opensearch)].opensearch.hosts>>"
        aws: "<<$.<<pipeline-name>>.sink[?(@.opensearch)].opensearch.aws>>"
        username: "<<$.<<pipeline-name>>.sink[?(@.opensearch)].opensearch.username>>"
        password: "<<$.<<pipeline-name>>.sink[?(@.opensearch)].opensearch.password>>"
        index: "<<$.<<pipeline-name>>.sink[?(@.opensearch)].opensearch.index>>"
        action: "upsert"
        document_id: "${getMetadata(\"_primary_key\")}"
        script:
          source: "String[] fields = params.fields.splitOnToken(','); if (params.is_parent == 'true') { if (params.is_delete == 'true') { ctx.op = 'delete' } else { for (String f : fields) { if (params.doc.containsKey(f)) { ctx._source[f] = params.doc[f] } } } } else { String arr = params.child_table_name; String pkName = params.child_pk_name; String pkVal = params.child_pk_value; if (!ctx._source.containsKey(arr)) { ctx._source[arr] = [] } ctx._source[arr].removeIf(e -> e[pkName].toString() == pkVal); if (params.is_delete != 'true') { def entry = [:]; for (String f : fields) { if (params.doc.containsKey(f)) { entry[f] = params.doc[f] } } entry[pkName] = params.doc[pkName]; ctx._source[arr].add(entry) } }"
          params:
            table: "${getMetadata(\"_table\")}"
            fields: "${getMetadata(\"_fields\")}"
            is_delete: "${getMetadata(\"_is_delete\")}"
            is_parent: "${getMetadata(\"_is_parent\")}"
            child_table_name: "${getMetadata(\"_child_table_name\")}"
            child_pk_name: "${getMetadata(\"_child_pk_name\")}"
            child_pk_value: "${getMetadata(\"_child_pk_value\")}"
  routes: "<<$.<<pipeline-name>>.routes>>"
