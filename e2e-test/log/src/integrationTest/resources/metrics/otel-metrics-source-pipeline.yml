otel-metrics-pipeline:
  workers: 2
  source:
    otel_metrics_source:
      http_path: "/${pipelineName}/metrics"
      port: 2021
      ssl: false
  sink:
    - opensearch:
        hosts: [ "https://node-0.example.com:9200" ]
        username: "admin"
        password: "admin"
        insecure: true
        index: "otel-metrics-index"
        flush_timeout: 5000
