# Example DataPrepper configuration with per-secret credential validation control

extensions:
  aws:
    secrets:
      # Example 1: Secret with validation enabled (default)
      production_secret:
        secret_id: prod-db-credentials
        region: us-east-1
        sts_role_arn: arn:aws:iam::123456789012:role/DataPrepperRole
        refresh_interval: PT1H
        validate_at_bootstrap: true  # Default - validates credentials at startup
      
      # Example 2: Secret with validation disabled
      # Use this when credentials may not be available at bootstrap
      delayed_secret:
        secret_id: delayed-credentials
        region: us-west-2
        sts_role_arn: arn:aws:iam::123456789012:role/DataPrepperRole
        refresh_interval: PT1H
        validate_at_bootstrap: false  # Skip validation at startup
